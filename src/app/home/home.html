<section class="home-page">
  <div class="container">
    <div class="intro-grid">
      <article class="content-section">
        <h1>Chi Sono</h1>
        <p *ngFor="let paragrafo of chiSono" [innerHTML]="paragrafo"></p>
        <figure class="quote-card">
          <blockquote>{{ rogersBreve }}</blockquote>
        </figure>
        <div class="hero-actions">
          <a class="btn btn-primary-warm btn-lg" routerLink="/contatti">
            <i class="bi bi-calendar-heart me-2"></i>
            Prenota un colloquio
          </a>
        </div>
      </article>

      <aside class="portrait-panel">
        <div class="foto-profilo-cerchio" aria-label="Ritratto di Michele"></div>
      </aside>
    </div>

    <article class="content-section section-band">
      <p class="eyebrow">Modello terapeutico</p>
      <h2>L'Approccio Centrato sulla Persona (ACP)</h2>
      <p *ngFor="let paragrafo of approccio" [innerHTML]="paragrafo"></p>

      <div class="pillars">
        <div class="pillar" *ngFor="let pilastro of pilastri">
          <h3>{{ pilastro.titolo }}</h3>
          <p>{{ pilastro.testo }}</p>
        </div>
      </div>

      <figure class="quote-card quote-card-wide">
        <blockquote>{{ rogersLungo }}</blockquote>
      </figure>
    </article>

    <article class="content-section help-section">
      <p class="eyebrow">Percorsi di sostegno psicologico e psicoterapia</p>
      <h2>Come Posso Aiutarti?</h2>
      <p *ngFor="let paragrafo of aiuto" [innerHTML]="paragrafo"></p>
      <ul class="help-list">
        <li *ngFor="let punto of aiutoPunti">{{ punto }}</li>
      </ul>
    </article>
  </div>

  <section class="closing-quote">
    <div class="container">
      <figure class="quote-card quote-card-featured">
        <blockquote>{{ citazioneLaoTse }}</blockquote>
        <figcaption>Lao Tse</figcaption>
      </figure>
    </div>
  </section>
</section>
