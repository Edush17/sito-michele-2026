<section class="py-5">
  <div class="container py-5">
    <div class="row align-items-center">
      <div class="col-md-7">
        <h2 class="text-primary mb-4">Chi sono</h2>
        <p class="fs-5 lh-base">{{ introduzione }}</p>
      </div>
      <div class="col-md-5 text-center d-none d-md-block">
        <div
          class="p-5 bg-light rounded-circle shadow-sm border mx-auto foto-profilo-cerchio"
          style="width: 400px; height: 400px"
        ></div>
      </div>
    </div>
  </div>
</section>

<section class="py-5 bg-light-artistic">
  <div class="container py-5">
    <div class="row align-items-center">
      
      <div class="col-md-6 text-center d-none d-md-block px-4">
        
        <div class="quote-container-artistic mx-auto shadow-organic">
          
          <i class="bi bi-chat-quote-fill quote-icon-warm" style="font-size: 5.5rem;"></i>
          
          <p class="mt-4 text-dark-warm fw-semibold quote-text-large">
            "Un incontro da persona a persona"
          </p>
          
          <div class="quote-divider"></div>
        </div>
        
      </div>
      
      <div class="col-md-6 px-4">
        <h2 class="text-primary-warm mb-4">La mia filosofia</h2>
        <p class="fs-5 lh-base text-secondary">{{ filosofia }}</p>
      </div>
      
    </div>
  </div>
</section>

<section class="py-5">
  <div class="container py-5 text-center">
    <div class="row justify-content-center">
      <div class="col-lg-9">
        <h2 class="text-primary mb-4">Il mio metodo</h2>
        <p
          class="fs-4 fst-italic p-4 border-start border-4 border-primary bg-light"
        >
          {{ metodo }}
        </p>
      </div>
    </div>
  </div>
</section>

<section class="bg-dark text-white py-5">
  <div class="container text-center py-5">
    <i class="bi bi-quote display-1 text-primary opacity-50"></i>
    <figure class="mt-2">
      <blockquote class="blockquote">
        <p class="fs-3 fst-italic lh-lg" style="white-space: pre-line">
          {{ citazioneLaoTse }}
        </p>
      </blockquote>
      <figcaption class="blockquote-footer text-light fs-5 mt-3">
        Lao Tse
      </figcaption>
    </figure>
  </div>
</section>
